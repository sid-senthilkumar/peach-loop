# Base configuration shared across all phases.
# Phase-specific configs (phase1.yaml, phase2/sweep.yaml) override these values.

project_name: peach-loop
version: "0.1.0"

paths:
  root: "."
  data: "data"
  raw_data: "data/raw"
  processed_data: "data/processed"
  checkpoints: "checkpoints"
  logs: "logs"
  events_log: "logs/events/events.jsonl"
  training_log: "logs/training/training.jsonl"
  tier1_log: "logs/tier1/tier1.jsonl"
  tier2_log: "logs/tier2/tier2.jsonl"
  state_file: "logs/run_state.json"
  decisions_pending: "logs/decisions_pending.jsonl"
  reports: "reports"
  digests: "reports/digests"
  phase1_report: "reports/phase1"
  phase2_report: "reports/phase2"
  phase3_report: "reports/phase3"

logging:
  level: INFO
  per_step_interval: 10  # emit training metrics every N steps

digest:
  schedule_hour: 8  # 08:00 local time — matches AGENTS.md §6
  check_interval_seconds: 60  # how often to check whether digest is due

tier1:
  disk_usage_critical_pct: 90
  loss_divergence_multiplier: 2.0   # current loss > 2x rolling baseline = divergence
  loss_divergence_window: 50        # rolling window in steps
  consecutive_resume_failures_max: 3

tier2:
  disk_usage_warning_pct: 80
  checkpoints_to_keep: 5
  dataloader_stall_timeout_sec: 600  # 10 min before Tier-1

checkpoints:
  interval_epochs: 20   # save a checkpoint every N epochs during training
  max_to_keep: 5        # keep this many checkpoints per run; oldest removed

checkpoint_protocol:
  poll_interval_seconds: 60   # how often the agent polls for CP response files
